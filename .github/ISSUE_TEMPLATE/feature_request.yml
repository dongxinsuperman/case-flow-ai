name: 功能建议
description: 提出与 Case Flow 公共能力相关的改进建议
title: "[Feature]: "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        请聚焦可复用的开源能力。企业私有 CLI、账号体系、数据准备和非飞书平台适配应由部署方自行二次开发。
  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 请说明真实的测试流程痛点，而不只是某个实现方案。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 说明它如何服务于 Case 的导入、更新、执行或证据回流。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案或补充背景
    validations:
      required: false
  - type: checkboxes
    id: scope
    attributes:
      label: 范围确认
      options:
        - label: 该建议不依赖提交私有账号、企业数据或内部服务地址。
          required: true
