name: Bug 报告
description: 报告可复现的 Case Flow 问题
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈。请勿提交真实账号、Token、企业地址、客户数据或未打码的执行报告。
  - type: input
    id: version
    attributes:
      label: Case Flow 版本或提交号
      placeholder: 例如 dea00d3，或 Docker 镜像标签
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: 使用模式
      options:
        - 快速模式
        - 标准模式（飞书）
        - 不确定
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 请使用脱敏的 Case、配置和步骤。
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望结果
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际结果与脱敏日志
      description: 可附脱敏截图、错误信息或最小日志片段。
    validations:
      required: true
  - type: checkboxes
    id: redacted
    attributes:
      label: 数据确认
      options:
        - label: 我已移除账号、密钥、企业地址、客户数据和未打码报告。
          required: true
